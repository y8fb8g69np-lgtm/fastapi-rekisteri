server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reititä /api-kutsut backendiin (Docker-verkossa palvelun nimi on "backend")
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA-reititys: kaikki muut polut palautetaan index.html:ään
    location / {
        try_files $uri $uri/ /index.html;
    }
}
